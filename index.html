<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #000; /* Černé pozadí pro maximální kontrast */
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
        }
        .logo {
            width: 60px;
            margin-bottom: 10px;
        }
        .channel-name {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .sub-count {
            font-size: 3.5rem;
            font-weight: bold;
            color: #ff0000; /* YouTube červená */
        }
        .label {
            font-size: 1rem;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <svg class="logo" viewBox="0 0 24 24" fill="#ff0000">
        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
    </svg>
    <div class="channel-name">mimostezky</div>
    <div id="subs" class="sub-count">...</div>
    <div class="label">ODBĚRATELŮ</div>
</div>

<script>
    const API_KEY = 'AIzaSyAs2CH0sUtDv_D0QiKHv9gw5X9f1YjVrAQ';
    const CHANNEL_ID = 'UCMCwGGf28pysVA37IRAWnwA'; // ID kanálu mimostezky

    async function updateSubs() {
        try {
            const response = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`);
            const data = await response.json();
            const count = data.items[0].statistics.subscriberCount;
            
            // Formátování čísla (např. 12500 -> 12.5K nebo nechat celé)
            document.getElementById('subs').innerText = Number(count).toLocaleString();
        } catch (error) {
            document.getElementById('subs').innerText = "Chyba";
        }
    }

    updateSubs();
    setInterval(updateSubs, 600000); // Aktualizace každých 10 minut
</script>

</body>
</html>
